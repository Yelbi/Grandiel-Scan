<body class="fondo">
    <!-- Skip to main content - Accessibility -->
    <a href="#main-content" class="skip-to-main">Saltar al contenido principal</a>

    <nav role="navigation" aria-label="Navegacion principal">
        <div class="logo">
            <a href="/index.html" aria-label="Ir a inicio"><img src="/img/logo.gif" alt="Grandiel Scan Logo"></a>
        </div>
        <ul class="list">
            <li><a href="/Mangas.html"><span>Mangas</span></a></li>
            <li><a href="/Actualizaciones.html"><span>Actualizaciones</span></a></li>
            <li><a href="/Nuevos.html"><span>Nuevos</span></a></li>
        </ul>

        <div id="ctn-bars-search">
            <input type="text" id="inputSearch" placeholder="Que deseas buscar?" aria-label="Buscador de manhwas">
            <div id="ctn-icon-search" role="button" aria-label="Boton de busqueda" tabindex="0">
                <i class="fas fa-search" id="icon-search" aria-hidden="true"></i>
            </div>
            <ul id="box-search" role="listbox" aria-label="Resultados de busqueda"></ul>
        </div>
        <div id="cover-ctn-search"></div>
    </nav>
    <hr class="br">

    <main id="main-content" class="curva" role="main">
        <br>

        <!-- Header de la pagina -->
        <div class="page-header">
            <h1><i class="fas fa-history" aria-hidden="true"></i> Historial de Lectura</h1>
            <p class="page-subtitle" id="history-count">Cargando...</p>
        </div>

        <!-- Acciones -->
        <div class="page-actions" id="history-actions" style="display: none;">
            <button type="button" id="clear-history-btn" class="btn-secondary">
                <i class="fas fa-trash" aria-hidden="true"></i>
                Limpiar Historial
            </button>
        </div>

        <!-- Mensaje cuando no hay historial -->
        <div id="no-history" class="empty-state" style="display: none;">
            <i class="fas fa-book-open" aria-hidden="true"></i>
            <h2>No hay historial</h2>
            <p>Comienza a leer manhwas para ver tu historial aqui.</p>
            <a href="/Mangas.html" class="btn-primary">Explorar Mangas</a>
        </div>

        <!-- Lista de historial -->
        <div id="history-list" class="history-list" role="list" aria-label="Historial de lectura">
            <!-- Se llena dinamicamente -->
        </div>

    </main>

    <footer class="footer" role="contentinfo">
        <div><p>2026 Grandiel Scan</p></div>
        <div><p>Contactos:</p></div>
    </footer>
