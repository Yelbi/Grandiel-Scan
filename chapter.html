<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Grandiel Scan">

    <!-- Meta tags dinamicos -->
    <meta name="description" id="meta-description" content="Lee capitulo en espanol gratis en Grandiel Scan">
    <meta name="keywords" id="meta-keywords" content="manga, manhwa, capitulo, leer online, espanol">

    <!-- Open Graph / Facebook -->

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">

    <meta property="twitter:description" id="twitter-description" content="">
    <meta property="twitter:image" id="twitter-image" content="">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#ff0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Grandiel Scan">
    <link rel="apple-touch-icon" href="/img/icons/icon-192x192.png">
    <link rel="manifest" href="/manifest.json">

    <link rel="stylesheet" href="/Styles/Style.css">
    <link rel="shortcut icon" href="/img/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Coming+Soon&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css">
    <title id="page-title">Cargando... - Grandiel Scan</title>
</head>
<body class="fondo">
    <!-- Skip to main content - Accessibility -->
    <a href="#main-content" class="skip-to-main">Saltar al contenido principal</a>

    <nav role="navigation" aria-label="Navegacion principal">
        <div class="logo">
            <a href="/index.html" aria-label="Ir a inicio"><img src="/img/logo.gif" alt="Grandiel Scan Logo" width="120"></a>
        </div>
        <ul class="list">
            <li><a href="/Mangas.html"><span>Mangas</span></a></li>
            <li><a href="/Actualizaciones.html"><span>Actualizaciones</span></a></li>
            <li><a href="/Nuevos.html"><span>Nuevos</span></a></li>
        </ul>
        <div class="barra">
            <input type="text" name="q" placeholder="Buscar" aria-label="Buscador">
            <div class="btn" role="button" tabindex="0" aria-label="Buscar">
                <i class="fas fa-search" aria-hidden="true"></i>
            </div>
        </div>
    </nav>
    <hr class="br">

    <!-- Barra de progreso de lectura -->
    <div id="progress-bar"></div>

    <!-- Breadcrumbs -->
    <nav aria-label="Migas de pan" class="breadcrumbs">
        <ol itemscope itemtype="https://schema.org/BreadcrumbList">
            <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                <a itemprop="item" href="/index.html">
                    <span itemprop="name">Inicio</span>
                </a>
                <meta itemprop="position" content="1" />
            </li>
            <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                <a itemprop="item" href="" id="breadcrumb-manga-link">
                    <span itemprop="name" id="breadcrumb-manga-title">Manga</span>
                </a>
                <meta itemprop="position" content="2" />
            </li>
            <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                <span itemprop="name" id="breadcrumb-chapter">Capitulo</span>
                <meta itemprop="position" content="3" />
            </li>
        </ol>
    </nav>

    <main id="main-content" class="curva" role="main">
    <!-- Navegacion de capitulos -->
    <div class="sig" role="navigation" aria-label="Navegacion de capitulos">
        <a href="#" id="prev-chapter" class="nav-disabled" aria-label="Capitulo anterior"><b id="prev-symbol">&lt;</b></a>
        <a href="#" id="manga-link"><b id="current-chapter">Cargando...</b></a>
        <a href="#" id="next-chapter" aria-label="Siguiente capitulo"><b id="next-symbol">&gt;</b></a>
    </div>

    <!-- Selector de capitulo -->
    <div class="chapter-selector-wrapper">
        <select id="chapter-selector" class="chapter-selector-select" aria-label="Seleccionar capitulo">
            <option value="">Seleccionar capitulo...</option>
        </select>
    </div>

    <!-- Contenedor de imagenes del capitulo -->
    <div class="dede" id="chapter-images">
        <p class="loading-message">Cargando imagenes...</p>
    </div>

    <!-- Navegacion inferior -->
    <div class="sig" role="navigation" aria-label="Navegacion de capitulos">
        <a href="#" id="prev-chapter-bottom" class="nav-disabled" aria-label="Capitulo anterior"><b id="prev-symbol-bottom">&lt;</b></a>
        <a href="#" id="manga-link-bottom"><b>Volver al manga</b></a>
        <a href="#" id="next-chapter-bottom" aria-label="Siguiente capitulo"><b id="next-symbol-bottom">&gt;</b></a>
    </div>
    </main>

    <footer class="footer" role="contentinfo">
        <div><p>2026 Grandiel Scan</p></div>
        <div><p>Contactos:</p></div>
    </footer>

    <!-- Scripts legacy para renderizado -->
    <script src="/Styles/chapter-renderer.js"></script>
    <!-- Modulos ES6 -->
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/pwa.js"></script>
</body>
</html>
