<body class="fondo">
    <nav role="navigation" aria-label="Navegacion principal">
        <div class="logo">
            <a href="/index.html" aria-label="Ir a inicio"><img src="/img/logo.gif" alt="Grandiel Scan Logo" width="120"></a>
        </div>
        <ul class="list">
            <li><a href="/Mangas.html"><span>Mangas</span></a></li>

        <div id="ctn-bars-search">
            <input type="text" id="inputSearch" placeholder="Que deseas buscar?">
            <div id="ctn-icon-search" class="btn">
                <i class="fas fa-search" id="icon-search" aria-hidden="true"></i>
            </div>
            <ul id="box-search" role="listbox" aria-label="Resultados de busqueda"></ul>
        </div>
        <div id="cover-ctn-search"></div>

    <hr class="br">

    <main class="curva" role="main">
        <br>
        <!-- Contenedor de la portada -->
        <div style="text-align: center;">
            <img id="manga-cover" style="border-radius: 5%;" src="" alt="" width="300" height="430" loading="lazy">
        </div>
        <br>

        <!-- Titulo del manga -->
        <h1 id="manga-title" style="text-align: center;">Cargando...</h1>
        <br>

        <!-- Descripcion -->
        <div class="parrafo">
            <p id="manga-description">Cargando descripcion...</p>
        </div>
        <br>

        <!-- Info adicional -->
        <div id="manga-info" style="text-align: center; color: #888; margin-bottom: 20px;">
            <span id="manga-type"></span> |
            <span id="manga-status"></span> |
            <span id="manga-genres"></span>
        </div>

        <!-- Lista de capitulos -->
        <section class="capitulos" aria-label="Lista de capitulos">
            <div id="chapters-container">
                <!-- Los capitulos se generan dinamicamente -->
            </div>
        </section>
    </main>
    <br>

    <footer class="footer" role="contentinfo">
        <div><p>2026 Grandiel Scan</p></div>
        <div><p>Contactos:</p></div>
    </footer>
