<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Sin Conexión - Grandiel Scan</title>
    <link rel="icon" type="image/gif" href="/img/logo.gif">
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .offline-container {
            max-width: 500px;
            width: 100%;
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .offline-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 0, 0, 0.3);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .offline-icon svg {
            width: 60px;
            height: 60px;
            fill: #ff0000;
        }

        .offline-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #fff;
        }

        .offline-message {
            font-size: 16px;
            color: #888;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .offline-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Cached content section */
        .cached-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cached-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cached-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .cached-link {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .cached-link:hover {
            background: rgba(255, 0, 0, 0.2);
        }

        /* Loading state for retry */
        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-loading .btn-text {
            display: none;
        }

        .btn-loading .btn-spinner {
            display: block;
        }

        .btn-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Logo */
        .logo {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .logo img {
            height: 50px;
        }

        /* Status indicator */
        .status-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 13px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
        }

        .status-dot.online {
            background: #2ecc71;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .offline-title {
                font-size: 24px;
            }

            .offline-message {
                font-size: 14px;
            }

            .offline-icon {
                width: 100px;
                height: 100px;
            }

            .offline-icon svg {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="logo">
        <img src="/img/logo.gif" alt="Grandiel Scan" onerror="this.style.display='none'">
    </a>

    <div class="offline-container">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M23.64 7c-.45-.34-4.93-4-11.64-4-1.5 0-2.89.19-4.15.48L18.18 13.8 23.64 7zm-6.6 8.22L3.27 1.44 2 2.72l2.05 2.06C1.91 5.76.59 6.82.36 7l11.63 14.49.01.01.01-.01 3.9-4.86 3.32 3.32 1.27-1.27-3.46-3.46z"/>
            </svg>
        </div>

        <h1 class="offline-title">Sin Conexion a Internet</h1>

        <p class="offline-message">
            Parece que no tienes conexion a internet. Verifica tu conexion e intenta de nuevo.
            Mientras tanto, puedes acceder al contenido que ya has visitado.
        </p>

        <div class="offline-actions">
            <button class="btn btn-primary" id="retry-btn" onclick="retryConnection()">
                <svg viewBox="0 0 24 24">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                <span class="btn-text">Reintentar Conexion</span>
                <div class="btn-spinner"></div>
            </button>

            <a href="/" class="btn btn-secondary">
                <svg viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span>Ir al Inicio</span>
            </a>
        </div>

        <div class="cached-section">
            <h2 class="cached-title">Paginas Disponibles Offline</h2>
            <div class="cached-links" id="cached-links">
                <a href="/" class="cached-link">Inicio</a>
                <a href="/Mangas.html" class="cached-link">Catalogo</a>
                <a href="/Favoritos.html" class="cached-link">Favoritos</a>
                <a href="/Historial.html" class="cached-link">Historial</a>
            </div>
        </div>
    </div>

    <div class="status-indicator">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Sin conexion</span>
    </div>

    <script>
        // Check connection status
        function updateStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');

            if (navigator.onLine) {
                dot.classList.add('online');
                text.textContent = 'Conexion restaurada';
                // Redirect to home after connection restored
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } else {
                dot.classList.remove('online');
                text.textContent = 'Sin conexion';
            }
        }

        // Retry connection
        function retryConnection() {
            const btn = document.getElementById('retry-btn');
            btn.classList.add('btn-loading');

            fetch('/', { method: 'HEAD', cache: 'no-store' })
                .then(response => {
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        throw new Error('No connection');
                    }
                })
                .catch(() => {
                    btn.classList.remove('btn-loading');
                    // Show error feedback
                    const text = btn.querySelector('.btn-text');
                    const originalText = text.textContent;
                    text.textContent = 'Aun sin conexion';
                    setTimeout(() => {
                        text.textContent = originalText;
                    }, 2000);
                });
        }

        // Load cached pages dynamically
        async function loadCachedPages() {
            if ('caches' in window) {
                try {
                    const cacheNames = await caches.keys();
                    const cache = await caches.open(cacheNames.find(name => name.startsWith('grandiel-scan-')) || cacheNames[0]);
                    if (cache) {
                        const keys = await cache.keys();
                        const htmlPages = keys
                            .filter(request => request.url.endsWith('.html') || request.url.endsWith('/'))
                            .map(request => {
                                const url = new URL(request.url);
                                return url.pathname;
                            });

                        // Update cached links if we found more pages
                        if (htmlPages.length > 0) {
                            const container = document.getElementById('cached-links');
                            const existingLinks = new Set(Array.from(container.querySelectorAll('a')).map(a => a.getAttribute('href')));

                            htmlPages.forEach(page => {
                                if (!existingLinks.has(page) && page !== '/offline.html') {
                                    const link = document.createElement('a');
                                    link.href = page;
                                    link.className = 'cached-link';
                                    link.textContent = getPageName(page);
                                    container.appendChild(link);
                                }
                            });
                        }
                    }
                } catch (e) {
                    console.log('Could not load cached pages:', e);
                }
            }
        }

        function getPageName(path) {
            const names = {
                '/': 'Inicio',
                '/index.html': 'Inicio',
                '/Mangas.html': 'Catalogo',
                '/Actualizaciones.html': 'Actualizaciones',
                '/Nuevos.html': 'Nuevos',
                '/Favoritos.html': 'Favoritos',
                '/Historial.html': 'Historial',
                '/manga.html': 'Manga',
                '/chapter.html': 'Capitulo'
            };
            return names[path] || path.replace(/^\/|\.html$/g, '');
        }

        // Event listeners
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);

        // Initial check
        updateStatus();
        loadCachedPages();
    </script>
</body>
</html>
